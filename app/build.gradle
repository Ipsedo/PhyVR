apply plugin: 'com.android.application'

android {
    compileSdkVersion 28
    buildToolsVersion "29.0.0"

    defaultConfig {
        applicationId "com.samuelberrien.phyvr"
        minSdkVersion 19
        targetSdkVersion 28
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11"
            }
        }
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.10.2"
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}



dependencies {
    implementation 'com.android.support:appcompat-v7:28.0.0'
    implementation 'com.android.support.constraint:constraint-layout:2.0.1'
}

task extractNdk(type: Copy)  {
    if (file("${project.rootDir}/libs/cardboard/sdk/build/outputs/aar/sdk-release.aar").exists()) {
        copy {
            from zipTree("${project.rootDir}/libs/cardboard/sdk/build/outputs/aar/sdk-release.aar")
            into "libs/cardboard"
            include "jni/**/libcardboard_api.so"
        }
        copy {
            from "${project.rootDir}/libs/cardboard/sdk/include/cardboard.h"
            into "libs/cardboard"
        }
    }
}

task deleteNdk(type: Delete) {
    delete "libs/cardboard/jni"
    delete "libs/cardboard/cardboard.h"
}

build.dependsOn(extractNdk)
clean.dependsOn(deleteNdk)
